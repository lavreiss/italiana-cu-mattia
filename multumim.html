<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesaj trimis | Italiana cu Mattia</title>
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Karla:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7EF;
    --ink:#2E2620;
    --ink-soft:#5C5248;
    --terra:#BC5531;
    --terra-deep:#96421F;
    --sage-deep:#3F4A34;
    --line:#DDD2BE;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Karla',sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .card{max-width:520px;text-align:center}
  .word{
    font-family:'Marcellus',serif;
    font-size:clamp(52px,10vw,84px);
    color:var(--terra);
    line-height:1.1;
  }
  .phon{font-size:17px;color:var(--ink-soft);font-style:italic;letter-spacing:.06em;margin-top:4px}
  .divider{width:52px;height:1px;background:var(--terra);opacity:.6;margin:26px auto}
  h1{font-family:'Marcellus',serif;font-weight:400;font-size:26px;margin-bottom:12px}
  p{color:var(--ink-soft);margin-bottom:8px}
  .btn{
    display:inline-block;margin-top:26px;
    background:var(--terra);color:#fff;
    padding:12px 26px;border-radius:999px;
    font-weight:500;font-size:15px;letter-spacing:.03em;
    text-decoration:none;
    transition:background .18s ease;
  }
  .btn:hover{background:var(--terra-deep)}
</style>
</head>
<body>
  <div class="card">
    <div class="word">Grazie!</div>
    <div class="phon">/gra &middot; tsie/ -- multumesc</div>
    <div class="divider"></div>
    <h1>Mesajul tau a fost trimis</h1>
    <p>Mattia l-a primit si te va contacta in curand pe emailul lasat de tine, ca sa stabiliti prima discutie -- cea gratuita.</p>
    <p>A presto!</p>
    <a class="btn" href="index.html">Inapoi la pagina principala</a>
  </div>
</body>
</html>
